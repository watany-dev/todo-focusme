<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todo Archive</title>
    <style>
      :root {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      body {
        margin: 16px;
        max-width: 900px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 12px;
      }
      a.btn {
        display: inline-block;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        text-decoration: none;
        color: inherit;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }
      th,
      td {
        border-bottom: 1px solid #eee;
        padding: 10px 6px;
        vertical-align: top;
      }
      th {
        text-align: left;
        font-weight: 600;
      }
      td.due {
        width: 140px;
        white-space: nowrap;
      }
      td.actions {
        width: 100px;
      }
      button {
        padding: 8px 10px;
        border: 1px solid #ccc;
        background: #fff;
        cursor: pointer;
        border-radius: 8px;
      }
      .muted {
        color: #666;
        font-size: 12px;
      }
      .error {
        color: #b00020;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>アーカイブ</h1>
    <a class="btn" href="/">← 戻る</a>
    <div id="err" class="error"></div>

    <table>
      <thead>
        <tr>
          <th>期日</th>
          <th>内容</th>
          <th>アーカイブ日時</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>

    <script>
      const listEl = document.getElementById("list");
      const errEl = document.getElementById("err");

      function esc(s) {
        return String(s).replace(
          /[&<>"']/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c],
        );
      }

      async function api(path, options) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json" },
          cache: "no-store",
          ...options,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) throw new Error(data.error || "HTTP " + res.status);
        return data;
      }

      function render(tasks) {
        listEl.innerHTML = "";
        for (const t of tasks) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
          <td class="due">${esc(t.due_date || "")}</td>
          <td>
            <div>${esc(t.content)}</div>
            <div class="muted">created: ${esc(t.created_at)}</div>
          </td>
          <td>${esc(t.archived_at || "")}</td>
          <td class="actions">
            <button data-act="restore" data-id="${esc(t.id)}">復元</button>
          </td>`;
          listEl.appendChild(tr);
        }
      }

      async function load() {
        errEl.textContent = "";
        try {
          const data = await api("/api/archive");
          render(data.tasks || []);
        } catch (e) {
          errEl.textContent = e.message;
        }
      }

      listEl.addEventListener("click", async (ev) => {
        const btn = ev.target.closest("button");
        if (!btn || btn.getAttribute("data-act") !== "restore") return;
        const id = btn.getAttribute("data-id");

        btn.disabled = true;
        errEl.textContent = "";
        try {
          await api(`/api/archive/${encodeURIComponent(id)}`, { method: "PUT" });
          await load();
        } catch (e) {
          errEl.textContent = e.message;
        } finally {
          btn.disabled = false;
        }
      });

      load();
    </script>
  </body>
</html>
